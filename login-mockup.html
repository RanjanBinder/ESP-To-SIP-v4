<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Mockup — Pragathi Rail Digital Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── LEFT PANEL — station photo ── */
    .lm-photo {
      flex: 0 0 58%;
      position: relative;
      overflow: hidden;
    }

    .lm-photo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* gradient overlay so text is readable */
    .lm-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(8,18,40,0.22) 0%, rgba(8,18,40,0.08) 40%, rgba(8,18,40,0.7) 100%);
    }

    .lm-photo-brand {
      position: absolute;
      bottom: 44px;
      left: 44px;
      z-index: 2;
    }

    .lm-photo-brand-logo {
      height: 38px;
      filter: brightness(0) invert(1);
      margin-bottom: 12px;
      display: block;
    }

    .lm-photo-brand-title {
      font-size: 26px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .lm-photo-brand-sub {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.72);
      margin-top: 6px;
      line-height: 1.45;
    }

    /* zone badge */
    .lm-photo-zone {
      position: absolute;
      top: 28px;
      left: 28px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 6px 14px 6px 10px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
    }

    .lm-photo-zone-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }

    /* ── RIGHT PANEL — login form ── */
    .lm-form-panel {
      flex: 1;
      background: linear-gradient(150deg, #e8eeff 0%, #d5dcf8 55%, #c8d3f5 100%);
      border-left: 1px solid #c4cff0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 40px;
      position: relative;
    }

    /* card — the actual "username window" */
    .lm-form-inner {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      border: 1px solid #dce4f0;
      border-radius: 20px;
      box-shadow:
        0 2px 8px rgba(15,23,60,0.06),
        0 8px 32px rgba(15,23,60,0.08);
      padding: 36px 36px 28px;
    }

    .lm-logo {
      height: 40px;
      margin-bottom: 20px;
      display: block;
    }

    .lm-heading {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .lm-sub {
      font-size: 13.5px;
      color: #64748b;
      margin-top: 5px;
      line-height: 1.5;
    }

    .lm-fields {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .lm-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* sentence-case, no uppercase — feels warmer and more approachable */
    .lm-label {
      font-size: 12.5px;
      font-weight: 500;
      color: #475569;
    }

    .lm-input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 9px;
      padding: 0 13px;
      height: 44px;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .lm-input-wrap:focus-within {
      border-color: #3737c8;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(55,55,200,0.12);
    }

    .lm-input-icon {
      width: 16px;
      height: 16px;
      color: #94a3b8;
      flex-shrink: 0;
    }

    .lm-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      color: #0f172a;
      min-width: 0;
    }

    .lm-input::placeholder { color: #94a3b8; }

    .lm-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }

    .lm-remember {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      color: #64748b;
      cursor: pointer;
      user-select: none;
    }

    .lm-checkbox {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      background: #3737c8;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .lm-checkbox svg { width: 9px; height: 9px; }

    .lm-forgot {
      font-size: 12.5px;
      color: #3737c8;
      text-decoration: none;
      font-weight: 500;
    }
    .lm-forgot:hover { text-decoration: underline; }

    .lm-btn-login {
      margin-top: 20px;
      width: 100%;
      height: 46px;
      background: #3737c8;
      border: none;
      border-radius: 9px;
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      letter-spacing: -0.1px;
      transition: background 0.15s;
    }

    .lm-btn-login:hover { background: #2c2cb8; }
    .lm-btn-login:active { background: #2424a0; }

    /* footer lives inside the card at the bottom */
    .lm-card-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #f1f5f9;
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.5;
    }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .lm-photo { display: none; }
      .lm-form-panel { padding: 24px 20px; border-left: none; background: linear-gradient(180deg, #e8eeff 0%, #c8d3f5 100%); }
      .lm-form-inner { padding: 28px 24px 22px; }
    }
  </style>
</head>
<body>

  <!-- Left: Station Photo Panel -->
  <div class="lm-photo">
    <img src="assets/login-bg.png" alt="Railway Station" class="lm-photo-img" />

    <!-- Online badge -->
    <div class="lm-photo-zone">
      <span class="lm-photo-zone-dot"></span>
      South Central Railway — SCR
    </div>

    <!-- Bottom brand text -->
    <div class="lm-photo-brand">
      <img src="assets/pragathi-rail-logo.png" alt="Pragathi Rail" class="lm-photo-brand-logo" />
      <div class="lm-photo-brand-title">Digital ESP / SIP<br>Library</div>
      <div class="lm-photo-brand-sub">Centralized station document management<br>for Indian Railways operations.</div>
    </div>
  </div>

  <!-- Right: Login Form Panel -->
  <div class="lm-form-panel">
    <div class="lm-form-inner">

      <img src="assets/pragathi-rail-logo.png" alt="Pragathi Rail" class="lm-logo" />

      <div class="lm-heading">Welcome back</div>
      <div class="lm-sub">Sign in to your workspace</div>

      <div class="lm-fields">

        <!-- Username -->
        <div class="lm-field">
          <label class="lm-label">Rail ID / Username</label>
          <div class="lm-input-wrap">
            <svg class="lm-input-icon" viewBox="0 0 20 20" fill="none">
              <path d="M10 10C12.21 10 14 8.21 14 6s-1.79-4-4-4S6 3.79 6 6s1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/>
            </svg>
            <input type="text" class="lm-input" placeholder="e.g. Chandrasekhar" value="Chandrasekhar" />
          </div>
        </div>

        <!-- Password -->
        <div class="lm-field">
          <label class="lm-label">Password</label>
          <div class="lm-input-wrap">
            <svg class="lm-input-icon" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="9" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M7 9V6c0-1.657 1.343-3 3-3s3 1.343 3 3v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="password" class="lm-input" placeholder="Enter your password" value="password" />
          </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="lm-row">
          <label class="lm-remember">
            <div class="lm-checkbox">
              <svg viewBox="0 0 10 10" fill="none">
                <path d="M1.5 5l2.5 2.5 4.5-4.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            Keep me signed in
          </label>
          <a href="#" class="lm-forgot">Forgot password?</a>
        </div>

      </div>

      <!-- Sign In -->
      <button class="lm-btn-login">Sign in</button>

      <div class="lm-card-footer">
        Indian Railways &middot; Restricted Access<br>
        Unauthorised access is prohibited
      </div>

    </div>
  </div>

</body>
</html>
