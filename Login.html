<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Indian Railways — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
    }

    /* ── Background ── */
    .login-bg {
      position: fixed;
      inset: 0;
      background-image: url('https://www.figma.com/api/mcp/asset/dc951d8c-ec4b-460b-a4bb-48af11dfe6cd');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* ── Card ── */
    .login-card {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      box-shadow: 0 0 25px 3px rgba(0,0,0,0.07);
      width: 520px;
      max-width: calc(100vw - 32px);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      margin-left: auto;
      margin-right: 80px;
    }

    /* ── Logo + Welcome ── */
    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo-wrap {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .welcome-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .welcome-title {
      font-size: 32px;
      font-weight: 600;
      color: #030712;
      letter-spacing: -0.2px;
      line-height: 38px;
    }

    .welcome-sub {
      font-size: 14px;
      font-weight: 400;
      color: #9ca3af;
      line-height: 20px;
      max-width: 354px;
    }

    /* ── Form ── */
    .form-section {
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 100%;
    }

    .fields-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-label {
      display: flex;
      gap: 2px;
      align-items: baseline;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      color: #000000;
    }

    .field-label .required {
      color: #f15b50;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 11px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 16px;
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within {
      border-color: #3737c8;
      box-shadow: 0 0 0 3px rgba(55,55,200,0.08);
    }

    .input-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: #9ca3af;
    }

    .input-icon svg {
      width: 100%;
      height: 100%;
    }

    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Roboto', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #111827;
      line-height: 16px;
      background: transparent;
      min-width: 0;
    }

    .input-wrap input::placeholder {
      color: #9ca3af;
    }

    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #9ca3af;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      width: 20px;
      height: 20px;
    }

    .eye-btn svg { width: 100%; height: 100%; }

    /* ── Remember + Forgot ── */
    .remember-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .remember-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: #3737c8;
      border: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }

    .checkbox svg {
      width: 12px;
      height: 12px;
      color: #ffffff;
    }

    .remember-label {
      font-size: 14px;
      font-weight: 400;
      color: #6b7280;
      line-height: 20px;
      white-space: nowrap;
    }

    .forgot-link {
      font-size: 16px;
      font-weight: 500;
      color: #3737c8;
      line-height: 24px;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .forgot-link:hover { text-decoration: underline; }

    /* ── Buttons ── */
    .buttons-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .btn-login {
      width: 100%;
      background: #3737c8;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      letter-spacing: -0.18px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .btn-login {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover { background: #2b2bad; }
    .btn-login:active { background: #232391; }
    .btn-login:disabled { opacity: 0.85; cursor: not-allowed; }
    .btn-login:disabled:hover { background: #3737c8; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }

    .or-divider {
      font-size: 14px;
      font-weight: 400;
      color: #9ca3af;
      line-height: 20px;
      text-align: center;
    }

    .btn-sso {
      width: 100%;
      background: transparent;
      color: #3737c8;
      border: 1px solid #3737c8;
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      letter-spacing: -0.18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .btn-sso:hover { background: rgba(55,55,200,0.04); }

    .btn-sso svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .login-card {
        margin: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="login-bg"></div>

  <div class="login-card">

    <!-- Logo + Welcome -->
    <div class="logo-section">
      <div class="logo-wrap">
        <img src="https://www.figma.com/api/mcp/asset/67984fb2-d0fc-492a-a656-8f75a57a170a" alt="Indian Railways Logo" />
      </div>
      <div class="welcome-text">
        <p class="welcome-title">Welcome back</p>
        <p class="welcome-sub">Sign in to continue to your workspace.</p>
      </div>
    </div>

    <!-- Form -->
    <div class="form-section">

      <!-- Input Fields -->
      <div class="fields-group">

        <!-- Username -->
        <div class="field">
          <div class="field-label">
            <span>Username</span>
            <span class="required">&thinsp;*</span>
          </div>
          <div class="input-wrap">
            <span class="input-icon">
              <!-- user icon -->
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 10C12.2091 10 14 8.20914 14 6C14 3.79086 12.2091 2 10 2C7.79086 2 6 3.79086 6 6C6 8.20914 7.79086 10 10 10Z" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M17 18C17 15.2386 13.866 13 10 13C6.13401 13 3 15.2386 3 18" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <input type="text" id="username" placeholder="Enter your Username" value="Chandrasekhar" autocomplete="username" />
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <div class="field-label">
            <span>Password</span>
            <span class="required">&thinsp;*</span>
          </div>
          <div class="input-wrap">
            <span class="input-icon">
              <!-- lock icon -->
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="9" width="14" height="10" rx="2" stroke="#9ca3af" stroke-width="1.5"/>
                <path d="M7 9V6C7 3.79086 8.34315 2 10 2C11.6569 2 13 3.79086 13 6V9" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input type="password" id="password" placeholder="Enter your Password" autocomplete="current-password" />
            <button class="eye-btn" onclick="togglePassword()" aria-label="Toggle password visibility">
              <!-- eye icon -->
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 10C2 10 5 4 10 4C15 4 18 10 18 10C18 10 15 16 10 16C5 16 2 10 2 10Z" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="10" cy="10" r="2.5" stroke="#9ca3af" stroke-width="1.5"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember Me + Forgot Password -->
        <div class="remember-row">
          <div class="remember-left">
            <div class="checkbox" onclick="toggleRemember(this)" role="checkbox" aria-checked="true" tabindex="0">
              <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="remember-label">Keep Me signed In</span>
          </div>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

      </div>

      <!-- CTA Buttons -->
      <div class="buttons-group">
        <button class="btn-login" onclick="handleLogin()">Login</button>
        <span class="or-divider">Or</span>
        <button class="btn-sso" onclick="handleSSO()">
          <!-- shield icon -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4 6V12C4 16.4183 7.58172 20.4 12 22C16.4183 20.4 20 16.4183 20 12V6L12 2Z" stroke="#3737c8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Login with SSO
        </button>
      </div>

    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function toggleRemember(el) {
      const checked = el.getAttribute('aria-checked') === 'true';
      el.setAttribute('aria-checked', String(!checked));
      el.style.background = !checked ? '#3737c8' : '#ffffff';
      el.style.border = !checked ? '1px solid #f3f4f6' : '1px solid #d1d5db';
      el.innerHTML = !checked
        ? `<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
             <path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
           </svg>`
        : '';
    }

    function handleLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      if (!username || !password) {
        alert('Please enter your username and password.');
        return;
      }
      const btn = document.querySelector('.btn-login');
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span>Signing in…';
      setTimeout(() => { window.location.href = 'Dashboard.html'; }, 1200);
    }

    function handleSSO() {
      alert('SSO login is not configured.');
    }
  </script>

</body>
</html>
