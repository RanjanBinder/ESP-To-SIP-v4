<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital Library — Indian Railways ESP · SIP · LOP Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
    #root { height: 100vh; }

    /* ── Login overlay ── */
    *, *::before, *::after { box-sizing: border-box; }

    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto', 'Inter', sans-serif;
      background: #0f172a;
    }

    .lr-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://www.figma.com/api/mcp/asset/dc951d8c-ec4b-460b-a4bb-48af11dfe6cd');
      background-size: cover;
      background-position: center;
    }

    .lr-card {
      position: relative;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      box-shadow: 0 0 25px 3px rgba(0,0,0,0.07);
      width: 520px;
      max-width: calc(100vw - 32px);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      margin-left: auto;
      margin-right: 80px;
    }

    .lr-logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .lr-logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
    }

    .lr-logo img { width: 100%; height: 100%; object-fit: cover; }

    .lr-welcome { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }

    .lr-title {
      font-size: 32px;
      font-weight: 600;
      color: #030712;
      letter-spacing: -0.2px;
      line-height: 38px;
      margin: 0;
    }

    .lr-sub {
      font-size: 14px;
      font-weight: 400;
      color: #9ca3af;
      line-height: 20px;
      max-width: 354px;
      margin: 0;
    }

    .lr-form { display: flex; flex-direction: column; gap: 28px; width: 100%; }
    .lr-fields { display: flex; flex-direction: column; gap: 16px; }
    .lr-field { display: flex; flex-direction: column; gap: 4px; }

    .lr-label {
      display: flex;
      gap: 2px;
      align-items: baseline;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      color: #000;
    }

    .lr-label .req { color: #f15b50; }

    .lr-input-wrap {
      display: flex;
      align-items: center;
      gap: 11px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 16px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .lr-input-wrap:focus-within {
      border-color: #3737c8;
      box-shadow: 0 0 0 3px rgba(55,55,200,0.08);
    }

    .lr-icon { width: 20px; height: 20px; flex-shrink: 0; }
    .lr-icon svg { width: 100%; height: 100%; }

    .lr-input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 400;
      color: #111827;
      line-height: 16px;
      background: transparent;
      min-width: 0;
    }

    .lr-input-wrap input::placeholder { color: #9ca3af; }

    .lr-eye {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #9ca3af;
      display: flex;
      align-items: center;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .lr-eye svg { width: 100%; height: 100%; }

    .lr-remember-row { display: flex; align-items: center; gap: 16px; }
    .lr-remember-left { display: flex; align-items: center; gap: 8px; flex: 1; }

    .lr-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: #3737c8;
      border: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }

    .lr-checkbox svg { width: 12px; height: 12px; }

    .lr-remember-label { font-size: 14px; font-weight: 400; color: #6b7280; line-height: 20px; white-space: nowrap; }

    .lr-forgot { font-size: 16px; font-weight: 500; color: #3737c8; line-height: 24px; text-decoration: none; white-space: nowrap; flex-shrink: 0; }
    .lr-forgot:hover { text-decoration: underline; }

    .lr-btns { display: flex; flex-direction: column; align-items: center; gap: 24px; }

    .lr-btn-login {
      width: 100%;
      background: #3737c8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      letter-spacing: -0.18px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .lr-btn-login:hover { background: #2b2bad; }

    .lr-or { font-size: 14px; color: #9ca3af; line-height: 20px; }

    .lr-btn-sso {
      width: 100%;
      background: transparent;
      color: #3737c8;
      border: 1px solid #3737c8;
      border-radius: 8px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .lr-btn-sso:hover { background: rgba(55,55,200,0.04); }
    .lr-btn-sso svg { width: 20px; height: 20px; flex-shrink: 0; }

    .lr-error {
      display: none;
      font-size: 13px;
      color: #f15b50;
      text-align: center;
      margin-top: -12px;
    }

    @media (max-width: 768px) {
      .lr-card { margin: 16px; }
    }
  </style>
  <script src="react.js"></script>
  <script src="react-dom.js"></script>
  <script src="xlsx.js"></script>
</head>
<body>

  <!-- Login overlay — shown first, removed on successful auth -->
  <div id="login-overlay">
    <div class="lr-bg"></div>
    <div class="lr-card">

      <div class="lr-logo-section">
        <div class="lr-logo">
          <img src="https://www.figma.com/api/mcp/asset/67984fb2-d0fc-492a-a656-8f75a57a170a" alt="Indian Railways Logo" />
        </div>
        <div class="lr-welcome">
          <p class="lr-title">Welcome</p>
          <p class="lr-sub">Access your account securely using your username and password</p>
        </div>
      </div>

      <div class="lr-form">
        <div class="lr-fields">

          <!-- Username -->
          <div class="lr-field">
            <div class="lr-label"><span>Username</span><span class="req">&thinsp;*</span></div>
            <div class="lr-input-wrap">
              <span class="lr-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M10 10C12.2091 10 14 8.20914 14 6C14 3.79086 12.2091 2 10 2C7.79086 2 6 3.79086 6 6C6 8.20914 7.79086 10 10 10Z" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M17 18C17 15.2386 13.866 13 10 13C6.13401 13 3 15.2386 3 18" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <input type="text" id="lr-username" placeholder="Enter your Username" value="sarath" autocomplete="username" />
            </div>
          </div>

          <!-- Password -->
          <div class="lr-field">
            <div class="lr-label"><span>Password</span><span class="req">&thinsp;*</span></div>
            <div class="lr-input-wrap">
              <span class="lr-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="3" y="9" width="14" height="10" rx="2" stroke="#9ca3af" stroke-width="1.5"/>
                  <path d="M7 9V6C7 3.79086 8.34315 2 10 2C11.6569 2 13 3.79086 13 6V9" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </span>
              <input type="password" id="lr-password" placeholder="Enter your Password" value="Rail@2025#IR" autocomplete="current-password" />
              <button class="lr-eye" onclick="lrTogglePwd()" aria-label="Toggle password visibility">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2 10C2 10 5 4 10 4C15 4 18 10 18 10C18 10 15 16 10 16C5 16 2 10 2 10Z" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="10" cy="10" r="2.5" stroke="#9ca3af" stroke-width="1.5"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Remember + Forgot -->
          <div class="lr-remember-row">
            <div class="lr-remember-left">
              <div class="lr-checkbox" id="lr-chk" role="checkbox" aria-checked="true" tabindex="0" onclick="lrToggleChk()">
                <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <span class="lr-remember-label">Keep Me signed In</span>
            </div>
            <a href="#" class="lr-forgot">Forgot password?</a>
          </div>

        </div>

        <div class="lr-btns">
          <p class="lr-error" id="lr-error">Incorrect username or password. Please try again.</p>
          <button class="lr-btn-login" onclick="lrLogin()">Login</button>
          <span class="lr-or">Or</span>
          <button class="lr-btn-sso">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L4 6V12C4 16.4183 7.58172 20.4 12 22C16.4183 20.4 20 16.4183 20 12V6L12 2Z" stroke="#3737c8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Login with SSO
          </button>
        </div>

      </div>
    </div>
  </div>

  <div id="root" style="display:none;"></div>

  <script>
    // Credentials
    var LR_USER = 'sarath';
    var LR_PASS = 'Rail@2025#IR';

    // If already authenticated this session, skip overlay immediately
    (function() {
      try {
        if (sessionStorage.getItem('lr-authed') === '1') {
          var ov = document.getElementById('login-overlay');
          if (ov) ov.style.display = 'none';
          var root = document.getElementById('root');
          if (root) root.style.display = '';
        }
      } catch(e) {}
    })();

    function lrTogglePwd() {
      var inp = document.getElementById('lr-password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function lrToggleChk() {
      var el = document.getElementById('lr-chk');
      var checked = el.getAttribute('aria-checked') === 'true';
      el.setAttribute('aria-checked', String(!checked));
      el.style.background = !checked ? '#3737c8' : '#fff';
      el.style.border = !checked ? '1px solid #f3f4f6' : '1px solid #d1d5db';
      el.innerHTML = !checked
        ? '<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        : '';
    }

    function lrLogin() {
      var u = document.getElementById('lr-username').value.trim();
      var p = document.getElementById('lr-password').value;
      var err = document.getElementById('lr-error');
      if (u === LR_USER && p === LR_PASS) {
        // Write the session the Digital Library app expects
        var session = { railId: u, operator: 'Sarath', division: 'SCR', accessDesk: 'approver' };
        try {
          sessionStorage.setItem('ir-login-session', JSON.stringify(session));
          sessionStorage.setItem('lr-authed', '1');
        } catch(e) {}
        // Fade out overlay then reload so React app picks up the session
        var overlay = document.getElementById('login-overlay');
        overlay.style.transition = 'opacity 0.3s';
        overlay.style.opacity = '0';
        setTimeout(function() { window.location.reload(); }, 320);
      } else {
        err.style.display = 'block';
        var pwdWrap = document.getElementById('lr-password').closest ? document.getElementById('lr-password').closest('.lr-input-wrap') : null;
        if (pwdWrap) pwdWrap.style.borderColor = '#f15b50';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && document.getElementById('login-overlay') && document.getElementById('login-overlay').style.display !== 'none') lrLogin();
    });

    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById('root');
      if (el && !el.childElementCount) {
        el.innerHTML = '<div style="font-family:sans-serif;padding:32px;color:#c00"><strong>App error:</strong> ' + msg + '<br><small>' + src + ':' + line + '</small></div>';
      }
    };
  </script>

  <!-- Load design-system components in dependency order -->
  <script src="icons.js?v=8"></script>
  <script src="components-forms.js?v=8"></script>
  <script src="components-data.js?v=8"></script>
  <script src="components-nav.js?v=8"></script>

  <!-- Tweaks panel -->
  <script src="tweaks-panel.js?v=8"></script>

  <!-- Dashboard screen (embedded inside shared sidebar navigation) -->
  <script>window.__EMBED_DASHBOARD_PAGE = true;</script>
  <script src="dashboard.js?v=8"></script>

  <!-- Station Hub screen -->
  <script src="station-hub.js?v=8"></script>

  <!-- Workspace screen -->
  <script src="workspace.js?v=8"></script>

  <!-- Digital Library screen -->
  <script src="digital-library.js?v=8"></script>
</body>
</html>
